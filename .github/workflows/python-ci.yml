name: CrewAI CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop
      - staging

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - hierarchical
          - sequential

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd ${{ matrix.project }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Tests
        run: |
          cd ${{ matrix.project }}
          python -m pytest -v