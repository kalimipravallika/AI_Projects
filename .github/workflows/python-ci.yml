name: CrewAI CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - staging
      - "feature/**"

  pull_request:
    branches:
      - main
      - develop
      - staging

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        project:
          - hierarchical
          - sequential

    defaults:
      run:
        working-directory: ${{ matrix.project }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ matrix.project }}/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        env:
          OPENAI_API_KEY: dummy-key
          SERPER_API_KEY: dummy-key
        run: |
          python -m pytest -v